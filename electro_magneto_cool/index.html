<script type="text/javascript">
// CHARGEMENT SVG
function chargerSVG(fichier, id) {
  return fetch(fichier)
    .then(r => r.text())
    .then(svg => {
      document.getElementById(id).innerHTML = svg;
    });
}

// ANIMATION FOUDRE
function declencherFoudre(id) {
  const el = document.querySelector('#' + id + ' svg');
  el.style.animation = 'foudre 0.5s';
  
  el.addEventListener('animationend', () => {
    el.style.animation = 'none';
    const delai = Math.random() * 8000 + 4000;
    setTimeout(() => declencherFoudre(id), delai);
  }, { once: true });
}

function declencherTous() {
  ['eclair_1', 'eclair_2', 'eclair_3', 'eclair_4'].forEach(id => declencherFoudre(id));
}

function boucle() {
  if (Math.random() < 0.7) {
    declencherTous();
  }
  const delai = Math.random() * 10000 + 5000;
  setTimeout(boucle, delai);
}

// HOVER IMAGE → SOULIGNER MENU
const couples = [
  ['img_champs_elec', 'lien_champs'],
  ['img_longueur_onde', 'lien_longueur_onde'],
  ['img_antenne', 'lien_antenne'],
  ['img_terre', 'lien_terre'],
  ['img_tel', 'lien_tel'],
  ['img_requin', 'lien_vivant'],
  ['img_radio', 'lien_frequence'],
];

couples.forEach(([imgId, lienId]) => {
  const img = document.getElementById(imgId);
  const lien = document.getElementById(lienId);
  img.addEventListener('mouseover', () => {
    lien.style.textDecoration = 'underline';
    lien.style.fontWeight = '900';
    lien.style.fontStyle = 'italic';
  });
  img.addEventListener('mouseout', () => {
    lien.style.textDecoration = 'none';
    lien.style.fontWeight = 'normal';
    lien.style.fontStyle = 'normal';
  });

  // HOVER MENU → GROSSIR IMAGE
  lien.addEventListener('mouseover', () => img.style.transform = 'scale(1.2)');
  lien.addEventListener('mouseout', () => img.style.transform = 'scale(1)');
});

// CHARGEMENT ET LANCEMENT
Promise.all([
  chargerSVG('img/eclair_1b.svg', 'eclair_1'),
  chargerSVG('img/eclair_2.svg', 'eclair_2'),
  chargerSVG('img/eclair_3.svg', 'eclair_3'),
  chargerSVG('img/eclair_4.svg', 'eclair_4'),
]).then(() => {
  declencherFoudre('eclair_1');
  declencherFoudre('eclair_2');
  declencherFoudre('eclair_3');
  declencherFoudre('eclair_4');
  boucle();
});
</script>
