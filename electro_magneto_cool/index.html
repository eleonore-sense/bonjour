<script type="text/javascript">
// CHARGEMENT SVG + DUPLICATION DU PATH (core + glow)
function chargerSVG(fichier, id) {
  return fetch(fichier)
    .then(r => r.text())
    .then(svgText => {
      const container = document.getElementById(id);
      container.innerHTML = svgText;

      const svg = container.querySelector('svg');
      const paths = svg.querySelectorAll('path');

      if (paths.length === 0) {
        console.log('pas de path dans', id);
        return;
      }

      paths.forEach(path => {
        const glow = path.cloneNode(true);
        glow.classList.add('glow');
        path.classList.add('core');

        path.parentNode.insertBefore(glow, path);
      });
    });
}

const couples = [
  ['img_champs_elec', 'lien_champs'],
  ['img_longueur_onde', 'lien_longueur_onde'],

  ['img_capteur', 'lien_capteur'],
];

couples.forEach(([imgId, lienId]) => {
  const img = document.getElementById(imgId);
  const lien = document.getElementById(lienId);
  img.addEventListener('mouseover', () => {
    lien.style.textDecoration = 'underline';
    lien.style.fontWeight = '900';
  });
  img.addEventListener('mouseout', () => {
    lien.style.textDecoration = 'none';
    lien.style.fontWeight = 'normal';
  });
  lien.addEventListener('mouseover', () => img.style.transform = 'scale(1.2)');
  lien.addEventListener('mouseout', () => img.style.transform = 'scale(1)');
});
